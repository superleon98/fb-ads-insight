version: '3.8'

services:
  frontend:
    image: nginx:alpine
    container_name: fb-ads-frontend
    ports:
      - "80:80"
    volumes:
      - ./app/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fb-ads-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/ads/health"]
      interval: 30s
      timeout: 10s
      retries: 3
